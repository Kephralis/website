<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kephralis</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400..600&display=block" rel="stylesheet" />
    
    <style>
        :root {
            --bg-body: #07090d;
            --bg-card: #161b22;
            --text-main: #ffffff;
            --text-muted: #7d8590;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            overflow: hidden;
        }

        /* --- Hero Title & RGB Wave --- */
        .hero-title {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1rem; 
            text-align: center;
            display: flex;
            gap: 2px;
            filter: drop-shadow(0px 0px 20px rgba(255, 255, 255, 0.15));
        }

        .hero-title span {
            display: inline-block;
            background: linear-gradient(90deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff, #8000ff, #ff00ff, #ff0000);
            background-size: 800% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: wave-float 2s ease-in-out infinite, rgb-shift 10s linear infinite;
        }

        .hero-title span:nth-child(1) { animation-delay: 0.0s; }
        .hero-title span:nth-child(2) { animation-delay: 0.1s; }
        .hero-title span:nth-child(3) { animation-delay: 0.2s; }
        .hero-title span:nth-child(4) { animation-delay: 0.3s; }
        .hero-title span:nth-child(5) { animation-delay: 0.4s; }
        .hero-title span:nth-child(6) { animation-delay: 0.5s; }
        .hero-title span:nth-child(7) { animation-delay: 0.6s; }
        .hero-title span:nth-child(8) { animation-delay: 0.7s; }
        .hero-title span:nth-child(9) { animation-delay: 0.8s; }

        @keyframes wave-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        @keyframes rgb-shift {
            0% { background-position: 0% center; }
            100% { background-position: -800% center; }
        }

        /* --- Button Container --- */
        .button-group {
            display: flex;
            gap: 20px;
            position: relative;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            background-color: var(--bg-card);
            border: 1px solid #30363d;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #21262d;
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        /* --- About Me Popup (Square Chat Bubble) --- */
        .about-popup {
            position: absolute;
            bottom: calc(100% + 15px);
            right: 0;
            width: 200px;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 8px;
            border-radius: 10px;
            display: none; /* Controlled by JS */
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Stubby Tail */
        .about-popup::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 65px; /* Aligned roughly above the About Me button */
            width: 16px;
            height: 16px;
            background: #161b22;
            border-right: 1px solid #30363d;
            border-bottom: 1px solid #30363d;
            transform: rotate(45deg);
        }

        .popup-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .popup-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .popup-btn .material-symbols-outlined {
            font-size: 20px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .hero-title { font-size: 3.5rem; }
            .button-group { flex-direction: column; width: 100%; max-width: 250px; }
            .about-popup { right: 50%; transform: translateX(50%); bottom: calc(100% + 15px); }
            .about-popup::after { right: 46%; }
        }
    </style>
</head>
<body>

    <h1 class="hero-title">
        <span>K</span><span>e</span><span>p</span><span>h</span><span>r</span><span>a</span><span>l</span><span>i</span><span>s</span>
    </h1>
    
    <div class="button-group">
        <a href="https://kephralis.github.io/tierlist/" class="btn">
            <span class="material-symbols-outlined">trophy</span>
            Tier List
        </a>
        
        <div style="position: relative;">
            <button class="btn" id="aboutBtn">
                <span class="material-symbols-outlined">person</span>
                About Me
            </button>

            <div class="about-popup" id="aboutPopup">
                <a href="https://kephralis.github.io/aboutme/resume.png" class="popup-btn" target="_blank">
                    <span class="material-symbols-outlined">description</span>
                    Resume
                </a>
                <a href="https://kephralis.github.io/aboutme/info" class="popup-btn">
                    <span class="material-symbols-outlined">person_book</span>
                    Info
                </a>
            </div>
        </div>
    </div>

    <script>
        const aboutBtn = document.getElementById('aboutBtn');
        const aboutPopup = document.getElementById('aboutPopup');

        // Toggle popup
        aboutBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = aboutPopup.style.display === 'flex';
            aboutPopup.style.display = isVisible ? 'none' : 'flex';
        });

        // Close when clicking anywhere else
        document.addEventListener('click', (e) => {
            if (!aboutPopup.contains(e.target) && e.target !== aboutBtn) {
                aboutPopup.style.display = 'none';
            }
        });
    </script>

</body>
</html>
