<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Horizontal Scroll</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
    
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --bg-row-high: #1c2128;
            --bg-row-low: #13171d;
            --text-main: #ffffff;
            --text-muted: #7d8590;
            --status-high: #238636;
            --status-low: #da3633;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            /* Centering the container vertically but allowing horizontal overflow */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 2rem;
        }

        /* --- Scrollable Wrapper --- */
        .board-wrapper {
            width: 100%;
            overflow-x: auto; /* This enables the horizontal scroll */
            padding-bottom: 20px; /* Space for the scrollbar */
            cursor: grab; /* Visual hint for scrollable area */
        }

        /* Custom Scrollbar Styling */
        .board-wrapper::-webkit-scrollbar {
            height: 8px;
        }
        .board-wrapper::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        .board-wrapper::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
        .board-wrapper::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        /* --- Grid Layout (Fixed 5 Columns) --- */
        .board-container {
            display: grid;
            /* Forces exactly 5 columns with a minimum width of 280px each */
            grid-template-columns: repeat(5, minmax(280px, 1fr));
            gap: 12px;
            /* Ensures the container expands to fit all columns side-by-side */
            width: max-content; 
            min-width: 100%;
            margin: 0 auto;
        }

        .tier-column {
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px solid #30363d;
            overflow: hidden;
            height: fit-content;
        }

        /* --- Headers & Gradients --- */
        .tier-header {
            padding: 14px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid #30363d;
        }

        .tier-1 .tier-header { 
            color: #a3e635; 
            background: linear-gradient(to bottom, rgba(163, 230, 53, 0.2), transparent); 
        }
        .tier-2 .tier-header { 
            color: #facc15; 
            background: linear-gradient(to bottom, rgba(250, 204, 21, 0.2), transparent); 
        }
        .tier-3 .tier-header { 
            color: #fb923c; 
            background: linear-gradient(to bottom, rgba(251, 146, 60, 0.2), transparent); 
        }
        .tier-4 .tier-header { 
            color: #f87171; 
            background: linear-gradient(to bottom, rgba(248, 113, 113, 0.2), transparent); 
        }
        .tier-5 .tier-header { 
            color: #a87956; 
            background: linear-gradient(to bottom, rgba(168, 121, 86, 0.25), transparent); 
        }

        /* --- Player Rows --- */
        .player-row {
            display: grid;
            grid-template-columns: 4px 32px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-bottom: 1px solid #21262d;
            transition: background-color 0.2s;
        }

        .player-row:hover {
            filter: brightness(1.1);
        }

        .player-row.rank-high { background-color: var(--bg-row-high); }
        .player-row.rank-low { background-color: var(--bg-row-low); opacity: 0.95; }

        .status-bar {
            height: 20px;
            width: 3px;
            border-radius: 2px;
        }
        .rank-high .status-bar { background-color: var(--status-high); }
        .rank-low .status-bar { background-color: var(--status-low); }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 3px;
            background: #30363d;
        }

        .username {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .arrows {
            display: flex;
            flex-direction: column;
            color: var(--text-muted);
            font-size: 0.65rem;
            line-height: 0.7;
        }

        .rank-high .arrows::before { content: '▲'; }
        .arrows::after { content: '▲'; }
        
        .tier-1 .player-row { background-color: rgba(163, 230, 53, 0.03); }

    </style>
</head>
<body>

    <div class="board-wrapper">
        <div class="board-container" id="leaderboard"></div>
    </div>

    <script>
        const data = {
            "Tier 1": [
                { name: "K1RBE", rank: "high", img: "https://minotar.net/avatar/K1RBE/32.png" }
            ],
            "Tier 2": [
                { name: "Camcal", rank: "high", img: "https://minotar.net/avatar/Camcal/32.png" },
                { name: "Demonmcc", rank: "high", img: "https://minotar.net/avatar/Demonmcc/32.png" },
                { name: "KingD3fault", rank: "high", img: "https://minotar.net/avatar/KingD3fault/32.png" },
                { name: "qPower", rank: "low", img: "https://minotar.net/avatar/qPower/32.png" },
                { name: "Tokenu", rank: "low", img: "https://minotar.net/avatar/Tokenu/32.png" },
                { name: "cloudmlol", rank: "low", img: "https://minotar.net/avatar/cloudmlol/32.png" }
            ],
            "Tier 3": [
                { name: "jayckuuub", rank: "high", img: "https://minotar.net/avatar/jayckuuub/32.png" },
                { name: "ItzTerrel", rank: "high", img: "https://minotar.net/avatar/ItzTerrel/32.png" },
                { name: "thelastw1nter", rank: "low", img: "https://minotar.net/avatar/thelastw1nter/32.png" },
                { name: "isolation", rank: "low", img: "https://minotar.net/avatar/isolation/32.png" }
            ],
            "Tier 4": [
                { name: "MPI_YT", rank: "high", img: "https://minotar.net/avatar/MPI_YT/32.png" },
                { name: "chuypopis", rank: "low", img: "https://minotar.net/avatar/chuypopis/32.png" }
            ],
            "Tier 5": [
                { name: "ALIPROYT1", rank: "high", img: "https://minotar.net/avatar/ALIPROYT1/32.png" },
                { name: "hiadyman", rank: "low", img: "https://minotar.net/avatar/hiadyman/32.png" }
            ]
        };

        function render() {
            const container = document.getElementById('leaderboard');
            
            Object.keys(data).forEach((tier, index) => {
                const tierDiv = document.createElement('div');
                tierDiv.className = `tier-column tier-${index + 1}`;
                
                let playersHtml = data[tier].map(p => `
                    <div class="player-row rank-${p.rank}">
                        <div class="status-bar"></div>
                        <img src="${p.img}" class="avatar">
                        <div class="username">${p.name}</div>
                        <div class="arrows"></div>
                    </div>
                `).join('');

                tierDiv.innerHTML = `
                    <div class="tier-header">🏆 ${tier}</div>
                    <div class="player-list">${playersHtml}</div>
                `;
                container.appendChild(tierDiv);
            });
        }

        render();
    </script>
</body>
</html>
