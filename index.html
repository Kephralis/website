<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kephralis</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400..600&display=block" rel="stylesheet" />
    
    <style>
        :root {
            --bg-body: #07090d;
            --bg-card: #161b22;
            --text-main: #ffffff;
            --text-muted: #7d8590;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            overflow: hidden;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1rem; 
            text-align: center;
            display: flex;
            gap: 2px;
            filter: drop-shadow(0px 0px 20px rgba(255, 255, 255, 0.15));
        }

        .hero-title span {
            display: inline-block;
            
            /* REFINED SPECTRUM FROM IMAGE */
            background: linear-gradient(
                90deg, 
                #ff0000, /* Red */
                #ff8000, /* Orange */
                #ffff00, /* Yellow */
                #00ff00, /* Green */
                #00ffff, /* Cyan */
                #0000ff, /* Blue */
                #8000ff, /* Purple */
                #ff00ff, /* Pink/Magenta */
                #ff0000  /* Loop back to Red */
            );
            background-size: 800% auto; /* Increased for smoother flow between more colors */
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: 
                wave-float 2s ease-in-out infinite,
                rgb-shift 10s linear infinite; /* Slightly slower to let the new colors "breathe" */
        }

        /* Wave Delays */
        .hero-title span:nth-child(1) { animation-delay: 0.0s; }
        .hero-title span:nth-child(2) { animation-delay: 0.1s; }
        .hero-title span:nth-child(3) { animation-delay: 0.2s; }
        .hero-title span:nth-child(4) { animation-delay: 0.3s; }
        .hero-title span:nth-child(5) { animation-delay: 0.4s; }
        .hero-title span:nth-child(6) { animation-delay: 0.5s; }
        .hero-title span:nth-child(7) { animation-delay: 0.6s; }
        .hero-title span:nth-child(8) { animation-delay: 0.7s; }
        .hero-title span:nth-child(9) { animation-delay: 0.8s; }

        @keyframes wave-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        @keyframes rgb-shift {
            0% { background-position: 0% center; }
            100% { background-position: -800% center; }
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            background-color: var(--bg-card);
            border: 1px solid #30363d;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn .material-symbols-outlined { font-size: 22px; }

        .btn:hover {
            background-color: #21262d;
            border-color: #8b949e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            .hero-title { font-size: 3.5rem; }
            .button-group {
                flex-direction: column;
                width: 100%;
                max-width: 250px;
            }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <h1 class="hero-title">
        <span>K</span><span>e</span><span>p</span><span>h</span><span>r</span><span>a</span><span>l</span><span>i</span><span>s</span>
    </h1>
    
    <div class="button-group">
        <a href="https://kephralis.github.io/tierlist/" class="btn">
            <span class="material-symbols-outlined">trophy</span>
            Tier List
        </a>
        <a href="https://kephralis.github.io/resume.png" class="btn" target="_blank" rel="noopener noreferrer">
            <span class="material-symbols-outlined">description</span>
            Resume
        </a>
    </div>

</body>
</html>
