<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Final Template</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
    
    <style>
        :root {
            --bg-body: #07090d;
            --bg-card: #161b22;
            --bg-row-high: #1c2128;
            --bg-row-low: #13171d;
            --text-main: #ffffff;
            --text-muted: #7d8590;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 2rem;
        }

        .board-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 24px;
        }

        .board-wrapper::-webkit-scrollbar {
            height: 16px;
        }
        .board-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .board-wrapper::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
            border: 3px solid var(--bg-body);
        }
        .board-wrapper::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        .board-container {
            display: grid;
            grid-template-columns: repeat(5, minmax(280px, 1fr));
            gap: 12px;
            width: max-content; 
            min-width: 100%;
            margin: 0 auto;
        }

        .tier-column {
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px solid #30363d;
            overflow: hidden;
            height: fit-content;
        }

        /* --- Headers Updated --- */
        .tier-header {
            padding: 18px 14px; /* Slightly more padding for the larger text */
            text-align: center;
            font-weight: 800; /* Extra bold for emphasis */
            font-size: 1.35rem; /* Larger font size as requested */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #30363d;
            text-transform: capitalize;
            letter-spacing: -0.02em;
        }

        .tier-1 .tier-header { 
            color: #a3e635; 
            background: linear-gradient(to bottom, rgba(163, 230, 53, 0.2), transparent); 
        }
        .tier-2 .tier-header { 
            color: #facc15; 
            background: linear-gradient(to bottom, rgba(250, 204, 21, 0.2), transparent); 
        }
        .tier-3 .tier-header { 
            color: #fb923c; 
            background: linear-gradient(to bottom, rgba(251, 146, 60, 0.2), transparent); 
        }
        .tier-4 .tier-header { 
            color: #f87171; 
            background: linear-gradient(to bottom, rgba(248, 113, 113, 0.2), transparent); 
        }
        .tier-5 .tier-header { 
            color: #a87956; 
            background: linear-gradient(to bottom, rgba(168, 121, 86, 0.25), transparent); 
        }

        /* --- Player Rows Updated --- */
        .player-row {
            display: grid;
            /* Column 1: Image, Column 2: Name, Column 3: Arrows */
            grid-template-columns: 32px 1fr auto; 
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid #21262d;
            transition: background-color 0.15s ease;
        }

        .player-row:hover {
            filter: brightness(1.15);
        }

        .player-row.rank-high { background-color: var(--bg-row-high); }
        .player-row.rank-low { background-color: var(--bg-row-low); opacity: 0.95; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: #30363d;
            object-fit: cover; /* Ensures non-square images don't stretch */
        }

        .username {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .arrows {
            display: flex;
            flex-direction: column;
            color: var(--text-muted);
            font-size: 0.65rem;
            line-height: 0.7;
        }

        .rank-high .arrows::before { content: '▲'; }
        .arrows::after { content: '▲'; }

    </style>
</head>
<body>

    <div class="board-wrapper">
        <div class="board-container" id="leaderboard"></div>
    </div>

    <script>
        const data = {
            "Actually Good": [
                { name: "Kephralis", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/sy.png" }
            ],
            "Decent": [
                { name: "Mr Binzy", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/bnz.png" },
                { name: "BisonJaguar", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/bj.png" },
                { name: "Rozern", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/rz.png" },
                { name: "Tik Tok yybd", rank: "high", img: "https://via.placeholder.com/32" },
            ],
            "Mid": [
                { name: "KB0L", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/kbb.png" },
                { name: "kifve", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/kfv.png" },
                { name: "Sorakimine", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "zSqmantha", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "Sayoshima", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "I BuFo I", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "STRAIQHT K", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "RAZPYlbsmYT", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "MegaFoxBound", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "c6m3", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "Drum is 9", rank: "low", img: "https://via.placeholder.com/32" }
            ],
            "Below Average": [
                { name: "SavedByP1ng", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/L.png" },
                { name: "Suspqct", rank: "high", img: "https://via.placeholder.com/32" },
                { name: "wClient", rank: "high", img: "https://via.placeholder.com/32" },
                { name: "kizueki", rank: "low", img: "https://via.placeholder.com/32" },
                { name: "DeViL1090109010", rank: "low", img: "https://via.placeholder.com/32" }
            ],
            "Trash": [
                { name: "PlaceholderUsername", rank: "high", img: "https://via.placeholder.com/32" },
                { name: "PlaceholderUsername2", rank: "low", img: "https://via.placeholder.com/32" }
            ]
        };

        function render() {
            const container = document.getElementById('leaderboard');
            
            Object.keys(data).forEach((tier, index) => {
                const tierDiv = document.createElement('div');
                tierDiv.className = `tier-column tier-${index + 1}`;
                
                let playersHtml = data[tier].map(p => `
                    <div class="player-row rank-${p.rank}">
                        <img src="${p.img}" class="avatar" alt="${p.name}">
                        <div class="username">${p.name}</div>
                        <div class="arrows"></div>
                    </div>
                `).join('');

                tierDiv.innerHTML = `
                    <div class="tier-header">${tier}</div>
                    <div class="player-list">${playersHtml}</div>
                `;
                container.appendChild(tierDiv);
            });
        }

        render();
    </script>
</body>
</html>
