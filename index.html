<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Core Reset & Styles --- */
        :root {
            /* Colors precise to the reference image */
            --bg-body: #101217;
            --bg-card: #181d24;
            --bg-row-even: #181d24; /* Darker than odd rows to match image */
            --bg-row-odd: #1b2129; 
            --text-main: #FFFFFF;
            --text-muted: #8b9bb4;
            
            /* Tier Header accent colors */
            --tier1-accent: #f59e0b;
            --tier2-accent: #9ca3af;
            --tier3-accent: #b45309;
            --tier4-accent: #111827;
            --tier5-accent: #111827;
            
            /* Status Indicators */
            --status-green: #10b981;
            --status-red: #ef4444;
            --status-grey: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        /* --- Main Layout Container --- */
        .board-container {
            display: grid;
            grid-template-columns: repeat(5, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1800px;
        }

        /* Responsive Breakpoints: Make columns stack on small screens */
        @media (max-width: 1400px) {
            .board-container { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 900px) {
            .board-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .board-container { grid-template-columns: 1fr; }
        }

        /* --- Tier Column Styles --- */
        .tier-column {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #232a35;
        }

        /* Tier Header (The Trophies) */
        .tier-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.25rem;
            text-transform: capitalize;
        }

        /* Dynamic Tier Header Colors */
        .tier-1 .tier-header { color: var(--tier1-accent); background: linear-gradient(to bottom, rgba(245, 158, 11, 0.1), transparent); }
        .tier-2 .tier-header { color: var(--tier2-accent); background: linear-gradient(to bottom, rgba(156, 163, 175, 0.1), transparent); }
        .tier-3 .tier-header { color: var(--tier3-accent); background: linear-gradient(to bottom, rgba(180, 83, 9, 0.1), transparent); }
        .tier-4 .tier-header { color: var(--text-main); background: linear-gradient(to bottom, rgba(17, 24, 39, 0.3), transparent); }
        .tier-5 .tier-header { color: var(--text-main); background: linear-gradient(to bottom, rgba(17, 24, 39, 0.3), transparent); }

        .trophy-icon {
            font-size: 1.5rem;
        }

        /* --- Player List and Rows --- */
        .player-list {
            display: flex;
            flex-direction: column;
        }

        .player-row {
            display: grid;
            grid-template-columns: 8px 36px 1fr auto;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #232a35;
            transition: background-color 0.2s;
        }

        /* Hover effect for better UX */
        .player-row:hover {
            background-color: rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        /* Alternating Row Colors like the image */
        .player-list .player-row:nth-child(odd) {
            background-color: var(--bg-row-odd);
        }

        .player-list .player-row:nth-child(even) {
            background-color: var(--bg-row-even);
        }

        /* -- Row Components -- */
        .status-indicator {
            width: 8px;
            height: 100%;
            border-radius: 4px;
        }
        /* Dynamic Status Colors */
        .status-online { background-color: var(--status-green); }
        .status-offline { background-color: var(--status-red); }
        .status-unknown { background-color: var(--status-grey); }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #303b4a;
        }

        .player-name {
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Handles long names cleanly */
        }

        .arrow-icons {
            display: flex;
            flex-direction: column;
            color: var(--text-muted);
            font-size: 0.7rem;
            opacity: 0.6;
            gap: 2px;
        }
    </style>

        // Function to create the visual HTML for a single player row
        function createPlayerRow(player) {
            return `
                <div class="player-row">
                    <div class="status-indicator status-${player.status}"></div>
                    <img src="${player.avatar}" alt="${player.name} avatar" class="player-avatar">
                    <div class="player-name">${player.name}</div>
                    <div class="arrow-icons">
                        <span>&#9650;</span>
                        <span>&#9660;</span>
                    </div>
                </div>
            `;
        }

        // Main function to generate the leaderboard
        function renderBoard() {
            const boardContainer = document.getElementById('board');
            let boardHtml = '';

            // Loop through each tier and create its column
            Object.keys(playersByTier).forEach((tierName, index) => {
                const tierClassName = tierName.toLowerCase().replace(' ', '-'); // e.g., 'tier 1' -> 'tier-1'
                const players = playersByTier[tierName];
                
                // Create the overall HTML structure for the column
                let columnHtml = `
                    <div class="tier-column ${tierClassName}">
                        <div class="tier-header">
                            <span class="trophy-icon">&#127942;</span>
                            <span class="tier-title">${tierName}</span>
                        </div>
                        <div class="player-list">
                            ${players.map(player => createPlayerRow(player)).join('')}
                        </div>
                    </div>
                `;
                boardHtml += columnHtml;
            });

            // Put the generated HTML into the main container
            boardContainer.innerHTML = boardHtml;
        }

        // Run the render function when the page loads
        document.addEventListener('DOMContentLoaded', renderBoard);
