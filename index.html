<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Final Template</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400..600&display=block" rel="stylesheet" />
    
    <style>
        :root {
            --bg-body: #07090d;
            --bg-card: #161b22;
            --bg-row-high: #1c2128;
            --bg-row-low: #13171d;
            --text-main: #ffffff;
            --text-muted: #7d8590;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 2rem;
        }

        .board-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 24px;
        }

        .board-wrapper::-webkit-scrollbar {
            height: 12px;
        }
        .board-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .board-wrapper::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
            border: 3px solid var(--bg-body);
        }

        .board-container {
            display: grid;
            grid-template-columns: repeat(6, minmax(260px, 1fr));
            gap: 10px;
            width: max-content; 
            min-width: 100%;
            margin: 0 auto;
        }

        .tier-column {
            /* Removed background and border from container to allow disconnection */
            background-color: transparent;
            height: fit-content;
        }

        /* --- Disconnected Headers --- */
        .tier-header {
            padding: 12px 10px;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: capitalize;
            letter-spacing: -0.02em;
            
            /* Added margin and individual rounding */
            margin-bottom: 4px; 
            border-radius: 6px;
            border: 1px solid #30363d;
        }

        .tier-header .material-symbols-outlined {
            font-size: 20px;
            font-variation-settings: 'wght' 400;
        }

        .tier-1 .tier-header { color: #a3e635; background: linear-gradient(to bottom, rgba(163, 230, 53, 0.2), var(--bg-card)); }
        .tier-2 .tier-header { color: #facc15; background: linear-gradient(to bottom, rgba(250, 204, 21, 0.2), var(--bg-card)); }
        .tier-3 .tier-header { color: #fb923c; background: linear-gradient(to bottom, rgba(251, 146, 60, 0.2), var(--bg-card)); }
        .tier-4 .tier-header { color: #f87171; background: linear-gradient(to bottom, rgba(248, 113, 113, 0.2), var(--bg-card)); }
        .tier-5 .tier-header { color: #a87956; background: linear-gradient(to bottom, rgba(168, 121, 86, 0.25), var(--bg-card)); }
        .tier-6 .tier-header { color: #8b949e; background: linear-gradient(to bottom, rgba(139, 148, 158, 0.2), var(--bg-card)); }

        /* --- Disconnected Player Rows --- */
        .player-row {
            display: grid;
            grid-template-columns: 32px 1fr auto; 
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            
            /* Added margin and individual rounding */
            margin-bottom: 4px;
            border-radius: 6px;
            border: 1px solid #21262d;
            transition: transform 0.1s ease;
        }

        .player-row:hover {
            transform: scale(1.02); /* Subtle hover effect since they are floating now */
        }

        /* Specific row backgrounds */
        .player-row.rank-high { background-color: var(--bg-row-high); }
        .player-row.rank-low { background-color: var(--bg-row-low); opacity: 0.95; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: #30363d;
            object-fit: cover;
        }

        .username {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1;
        }

        .rank-icon {
            font-size: 18px !important;
            font-variation-settings: 'wght' 600; 
            user-select: none;
        }

        .rank-high .rank-icon { color: #238636; }
        .rank-low .rank-icon { color: #da3633; }

    </style>
</head>
<body>

    <div class="board-wrapper">
        <div class="board-container" id="leaderboard"></div>
    </div>

    <script>
        const data = {

            "Decent": [

                { name: "BisonJaguar", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/bj.png" },
                { name: "Rozern", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/rz.png" },
                { name: "Tik Tok yybd", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" }
            ],
            "Mid": [
                { name: "KB0L", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/kbb.png" },
                { name: "kifve", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/kfv.png" },
                { name: "Sorakimine", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" },
                { name: "zSqmantha", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" },
                { name: "Sayoshima", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" },
                { name: "I BuFo I", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/simp.png" },
                { name: "STRAIQHT K", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" },
                { name: "MegaFoxBound", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" },
                { name: "c6m3", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" }
            ],
            "Below Average": [

                { name: "DeViL1090109010", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" }
            ],
            "Trash": [
                { name: "PlaceholderUsername", rank: "high", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" },
                { name: "PlaceholderUsername2", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" }
            ],
            "Cheating": [
                { name: "PlaceholderUsername3", rank: "low", img: "https://raw.githubusercontent.com/Kephralis/website/refs/heads/main/images/phold.png" }
            ]
        };

        const tierIcons = {
            "Actually Good": "crown",
            "Decent": "kid_star",
            "Mid": "sentiment_neutral",
            "Below Average": "trending_down",
            "Trash": "delete",
            "Cheating": "accessible_forward"
        };

        function render() {
            const container = document.getElementById('leaderboard');
            Object.keys(data).forEach((tier, index) => {
                const tierDiv = document.createElement('div');
                tierDiv.className = `tier-column tier-${index + 1}`;
                
                let playersHtml = data[tier].map(p => {
                    const iconName = p.rank === "high" ? "north" : "south";
                    return `
                        <div class="player-row rank-${p.rank}">
                            <img src="${p.img}" class="avatar" alt="${p.name}">
                            <div class="username">${p.name}</div>
                            <span class="material-symbols-outlined rank-icon">${iconName}</span>
                        </div>
                    `;
                }).join('');

                const headerIcon = tierIcons[tier] || "";
                tierDiv.innerHTML = `
                    <div class="tier-header">
                        <span class="material-symbols-outlined">${headerIcon}</span>
                        ${tier}
                    </div>
                    <div class="player-list">${playersHtml}</div>
                `;
                container.appendChild(tierDiv);
            });
        }
        render();
    </script>
</body>
</html>
